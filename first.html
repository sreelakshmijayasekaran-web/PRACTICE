<!DOCTYPE html>
<html>
<head>
    <title>First Page</title>

    <style>
        body{
            font-family: Arial, sans-serif;
            background:#e6f0ff;
            text-align:center;
            padding:120px;
            overflow:hidden;
        }

        .container{
            background:lavender;
            width:350px;
            margin:auto;
            padding:25px;
            border-radius:12px;
            box-shadow:0 0 10px rgba(0,0,0,0.2);

            /* animation start */
            opacity:0;
            transform:translateY(50px);
            transition:all 1s ease;
        }

        .show{
            opacity:1;
            transform:translateY(0);
        }

        h1{
            color:#333;
        }

        p{
            color:#666;
        }

        button{
            padding:10px 20px;
            border:none;
            background:green;
            color:white;
            border-radius:5px;
            cursor:pointer;
            font-size:16px;

            transition:0.3s;
        }

        button:hover{
            background:darkgreen;
            transform:scale(1.08);
        }

        /* floating animation */
        @keyframes float {
            0%{
                transform:translateY(0px);
            }
            
            25%{
                transform:translateX(10px);
            
            }
            50%{
                transform:translateY(-10px);
                
            }
            75%{
                transform:translateX(-10px);
            }
            100%{
                transform:translateY(0px);
            }
        }

        .floating{
            animation:float 3s ease-in-out infinite;
        }

    </style>
</head>

<body>

    <div class="container floating" id="box">

        <h1>Welcome Page</h1>

        <p>SREE TEXTILES</p>
        <p>PREMIUM GESTURES.</p>

        <button id="btn">
            FEEL IT
        </button>

    </div>

    <script>

        // Fade in effect when page loads
        window.onload = function(){
            document.getElementById("box").classList.add("show");
        };

        // Button click animation + page redirect
        document.getElementById("btn").onclick = function(){

            let box = document.getElementById("box");

            box.style.transform = "scale(0.9)";
            box.style.opacity = "0";

            setTimeout(function(){
                window.location.href = "second.html";
            }, 500);
        };

    </script>

</body>
</html>
