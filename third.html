<!DOCTYPE html>
<html>
<head>
    <title>Third Page</title>

    <style>
        body{
            font-family: Arial, sans-serif;
            background:#fff4e6;
            text-align:center;
            padding:50px;
        }

        .card{
            background:white;
            width:320px;
            margin:auto;
            padding:25px;
            border-radius:12px;
            box-shadow:0 0 10px rgba(0,0,0,0.2);
        }

        h1{
            color:#333;
        }

        p{
            color:#555;
        }

        button{
            padding:10px 20px;
            border:none;
            background:orange;
            color:white;
            border-radius:5px;
            cursor:pointer;
            font-size:15px;
        }

        button:hover{
            background:darkorange;
        }
    </style>
</head>

<body>

    <div class="card">

        <h1>Third Test Page</h1>

        <p>ID: 101</p>
        <p>Department: Computer Science</p>
        <p>Status: Active</p>

        <button onclick="window.location.href='index.html'">
            Back to Home
        </button>

    </div>

</body>
</html>
