<!DOCTYPE html>
<html>
<head>
    <title>Test Data Page</title>
    <style>
        body{
            font-family: Arial, sans-serif;
            background:#f2f2f2;
            text-align:center;
            padding:40px;
        }

        .box{
            background:white;
            width:300px;
            margin:auto;
            padding:20px;
            border-radius:10px;
            box-shadow:0 0 10px rgba(0,0,0,0.2);
        }

        h1{

        }

        p{
            color:#666;
        }

        button{
            padding:10px 20px;
            border:none;
            background:blue;

            border-radius:5px;
            cursor:pointer;
        }

        button:hover{
            background:darkblue;
        }
    </style>
</head>
<body>

    <div class="box">
        <h1>Secondary Page</h1>

        <p>Name: Test User</p>

        <button onclick="window.location.href='third.html'">

        <a></a>

</html>
