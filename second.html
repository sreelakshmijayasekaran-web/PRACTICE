<!DOCTYPE html>
<html>
<head>
    <title>Test Data Page</title>
    <style>
        body{
            font-family: Arial, sans-serif;
            background:#ffffff;
            text-align:center;
            padding:120px;
        }

        .box{
            background:rgb(255, 237, 98);
            width:300px;
            margin:auto;
            padding:20px;
            border-radius:10px;
            box-shadow:0px 0px 10px rgba(255, 255, 255, 0.2);
        }

        h1{
            color:#333;
        }

        p{
            color:#666;
        }

        button{
            padding:10px 20px;
            border:none;
            background:rgb(0, 0, 0);
            color:white;
            border-radius:5px;
            cursor:pointer;
        }

        button:hover{
            background:darkblue;
        }
    </style>
</head>
<body>

    <div class="box">
        <h1>Secondary Page</h1>

        <p>Name: Test User</p>
        <p>Email: test@example.com</p>
        <p>Score: 85</p>

        <button onclick="alert('Test Button Clicked')">
            Click Me
        </button>
    </div>

</body>
</html>
